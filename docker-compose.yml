services:
  backend:
    build:
      context: ./AutoLCA/backend
      dockerfile: Dockerfile.backend
    container_name: triya-backend
    environment:
      - DATABASE_URL=sqlite:///./data/lca_data.db
      - CORS_ORIGINS=http://localhost:80,http://localhost:3000,http://nginx:80
      - LOG_LEVEL=INFO
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - LOCAL_DATABASE_DIR=/data/bases
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}
    volumes:
      - triya_db:/app/data
      - ./Database_Triya/data_bases:/data/bases:ro
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./AutoLCA/frontend
      dockerfile: Dockerfile.frontend
    container_name: triya-frontend
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: triya-nginx
    ports:
      - "80:80"
    volumes:
      - ./AutoLCA/backend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  triya_db:
